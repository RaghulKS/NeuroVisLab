services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - .:/workspace
    working_dir: /workspace

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: neurovisionlab
      POSTGRES_USER: neurovisionlab
      POSTGRES_PASSWORD: neurovisionlab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

